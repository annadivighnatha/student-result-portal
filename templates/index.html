<!DOCTYPE html>
<html>

<head>
    <title>Student Result Portal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<header>
    <h1>Student Result Portal</h1>
    <p>University Examination Results</p>
</header>


<div class="card">

    <h2>Search Result</h2>

    <form action="/result" method="POST">

        <label>
            Enter Hall Ticket Number
        </label>


        <input 
            type="text"
            name="hall_ticket"
            placeholder="Example: 22691A0501"
            required
        >


        <button type="submit">
            Get Result
        </button>

    </form>

</div>


</body>

</html>
